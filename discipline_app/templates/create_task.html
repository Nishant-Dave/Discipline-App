{% extends 'base.html' %}
{% block content %}
<h2>Create New Task</h2>
<form method="post" action="{% url 'create_task' %}">
    {% csrf_token %}
    <input type="text" name="title" placeholder="Task title" required><br>
    <textarea name="description" placeholder="Description (optional)"></textarea><br>
    <label>Deadline time (24h):</label>
    <input type="time" name="deadline_time" required><br>
    <button type="submit">Create Non-Negotiable Task</button>
</form>
{% endblock %}
