<!DOCTYPE html>
<html>
<head>
    <title>Discipline App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav>
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'new_task_page' %}">Create Task</a>
        <a href="{% url 'stats' %}">Stats</a>
        <a href="{% url 'user_settings' %}">Settings</a>
        {% if user.is_authenticated %}
            <form method="post" action="{% url 'logout' %}" style="display:inline">{% csrf_token %}<button type="submit">Logout</button></form>
        {% endif %}
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
