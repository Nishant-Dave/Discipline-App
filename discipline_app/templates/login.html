{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Discipline App</title>
    {% tailwind_css %}
    <style>[x-cloak] { display: none !important; }</style>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-900 min-h-screen flex text-slate-200 antialiased">
    <!-- LEFT: Branding Section -->
    <div class="flex-1 hidden lg:flex items-center justify-center bg-gradient-to-br from-slate-900 via-blue-900/20 to-emerald-900/20 relative overflow-hidden">
        <div class="absolute inset-0 bg-slate-900/50 backdrop-blur-[2px]"></div>
        <div class="relative z-10 p-12 max-w-lg text-center">
            <h1 class="text-5xl font-black mb-6 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400 tracking-tight">Discipline App</h1>
            <p class="text-2xl font-light text-slate-300">No excuses. Just results.</p>
        </div>
    </div>
    
    <!-- RIGHT: Form Section -->
    <div class="flex-1 flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-20 xl:px-24">
        <div class="mx-auto w-full max-w-md">
            <div class="bg-slate-800 border border-slate-700/50 rounded-2xl p-8 sm:p-10 shadow-2xl">
                <div class="mb-8 text-center">
                    <h2 class="text-3xl font-bold text-slate-100">Welcome Back</h2>
                    <p class="text-sm text-slate-400 mt-2">Enter your credentials to continue</p>
                </div>
                
                <form method="post" class="space-y-6">
                    {% csrf_token %}
                    <div>
                        <label for="username" class="block text-sm font-medium text-slate-300 mb-2">Username</label>
                        <input type="text" id="username" name="username" required
                            class="w-full bg-slate-900/50 border border-slate-700 text-slate-200 placeholder-slate-500 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition-all shadow-inner">
                    </div>
                    <div x-data="{ show: false }">
                        <label for="password" class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                        <div class="relative">
                            <input :type="show ? 'text' : 'password'" id="password" name="password" required
                                class="w-full bg-slate-900/50 border border-slate-700 text-slate-200 placeholder-slate-500 rounded-lg px-4 py-3 pr-10 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 transition-all shadow-inner">
                            <button type="button" @click="show = !show" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200 focus:outline-none">
                                <svg x-show="!show" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                                <svg x-show="show" x-cloak class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
                            </button>
                        </div>
                    </div>
                    
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg shadow-[0_4px_14px_0_rgba(37,99,235,0.39)] hover:shadow-[0_6px_20px_rgba(37,99,235,0.23)] hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200">
                        Login
                    </button>
                    
                    <p class="text-center text-sm text-slate-400 mt-6">
                        Don't have an account? 
                        <a href="{% url 'register' %}" class="text-blue-400 hover:text-blue-300 font-medium transition-colors">Register here</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
