{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discipline App</title>
    {% tailwind_css %}
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-900 text-gray-100 font-sans antialiased min-h-screen flex flex-col">
    <nav class="bg-slate-800 border-b border-slate-700 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Left: Logo + Links -->
                <div class="flex items-center gap-8">
                    <a href="{% url 'dashboard' %}" class="text-xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400">Discipline App</a>
                    <div class="flex items-center gap-6">
                        <a href="{% url 'dashboard' %}" class="hover:text-blue-400 transition-colors text-sm font-medium">Dashboard</a>
                        <a href="{% url 'stats' %}" class="hover:text-blue-400 transition-colors text-sm font-medium">Stats</a>
                    </div>
                </div>

                <!-- Right: Actions & Account -->
                <div class="flex items-center gap-4" x-data="{ open: false }">
                    <a href="{% url 'new_task_page' %}" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-md transition-colors text-sm font-medium">New Task</a>
                    
                    <!-- Account Dropdown -->
                    <div class="relative">
                        <button @click="open = !open" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-md text-sm font-medium transition-colors">Account</button>
                        <div x-show="open" @click.away="open = false" 
                             class="absolute right-0 mt-2 w-48 bg-slate-800 border border-slate-700 rounded-md shadow-xl py-2 z-50">
                            <a href="#" class="block px-4 py-2 hover:bg-slate-700 transition-colors text-sm">Settings</a>
                            <form method="post" action="{% url 'logout' %}">
                                {% csrf_token %}
                                <button type="submit" class="block w-full text-left px-4 py-2 hover:bg-slate-700 text-red-400 transition-colors text-sm">Logout</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-800 border-t border-slate-700 py-6">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <h2 class="text-lg font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400">Discipline App</h2>
            <p class="text-sm text-slate-400 mt-1">No excuses. Just results.</p>
            <div class="mt-4">
                <a href="{% url 'about' %}" class="text-sm text-slate-500 hover:text-slate-300">About</a>
            </div>
        </div>
    </footer>
</body>
</html>
